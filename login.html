<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opportune - Log In</title>
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

  <!-- Navigation Bar -->
  <header>
    <!-- Make the logo clickable and link to the homepage -->
    <a href="index.html" class="logo">Opportune</a>
    <nav>
      <a href="login.html"><button>Sign In</button></a>
    </nav>
  </header>
  

  <!-- Login Form -->
  <main>
    <h1>Welcome Back!</h1>
    <form id="loginForm">
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>

      <label for="password">Password:</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required>

      <button type="submit">Log In</button>
    </form>

    <!-- Option to navigate to Sign Up if user doesn’t have an account -->
    <p>Don’t have an account? <a href="signup.html">Sign Up here</a></p>
  </main>

  <script>
    // Redirect to dashboard after signup or login
    document.getElementById('signupForm')?.addEventListener('submit', function(event) {
      event.preventDefault();  // Prevent form from refreshing the page
      window.location.href = 'dashboard.html';  // Redirect to dashboard after signup
    });
  
    document.getElementById('loginForm')?.addEventListener('submit', function(event) {
      event.preventDefault();  // Prevent form from refreshing the page
      window.location.href = 'dashboard.html';  // Redirect to dashboard after login
    });
  </script>

<script src="../js/auth.js"></script>




</body>
</html>
